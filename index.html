<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>cineRoll 94.0 | The Native Hybrid</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { 
            background: '#111111', panel: '#1c1c1e', border: '#2d2d30', coral: { 400: '#fb7185', 500: '#f43f5e', 600: '#e11d48' } 
        } } } }
    </script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exifr/dist/full.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/utif@3.1.0/UTIF.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Inter:wght@300;400;500;600&family=Cinzel:wght@600&family=Cormorant+Garamond:ital,wght@1,600&family=Montserrat:wght@400;700&family=Playfair+Display:ital,wght@0,600;1,600&family=Oswald:wght@500&family=Lato:wght@400;700&family=Bebas+Neue&family=Lora:ital,wght@0,500;1,500&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #111111; color: #a3a3a3; transition: background-color 0.3s; }
        .logo-font { font-family: 'Outfit', sans-serif; }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; border: 2px solid #111; }
        ::-webkit-scrollbar-corner { background: #111; }

        .tab-btn { padding: 12px 0; font-size: 10px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: #737373; border-bottom: 2px solid transparent; transition: all 0.2s; outline: none; flex: 1; text-align: center; }
        .tab-btn:hover { color: #d4d4d4; }
        .tab-btn.active { color: #fff; border-bottom-color: #f43f5e; }

        .min-label { display: flex; justify-content: space-between; font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: #888; margin-bottom: 8px; font-weight: 600; }
        .min-select, .min-input { width: 100%; background: #111; border: 1px solid #2d2d30; color: #e5e5e5; font-size: 12px; padding: 8px 10px; border-radius: 4px; outline: none; transition: border-color 0.2s; appearance: none; }
        .min-select:focus, .min-input:focus { border-color: #555; }
        
        .min-btn { background: #1c1c1e; border: 1px solid #2d2d30; color: #d4d4d4; font-size: 11px; padding: 8px 12px; border-radius: 4px; font-weight: 500; transition: all 0.1s; cursor: pointer; text-align: center; }
        .min-btn:hover { background: #2d2d30; border-color: #404040; color: #fff; }
        .min-btn.active { background: #2d2d30; border-color: #f43f5e; color: #fff; }

        .min-btn-primary { background: #f43f5e; color: #fff; border: none; font-weight: 600; padding: 12px; border-radius: 4px; cursor: pointer; transition: background 0.2s; width: 100%; text-transform: uppercase; letter-spacing: 0.05em; font-size: 11px;}
        .min-btn-primary:hover { background: #e11d48; }

        input[type=range] { -webkit-appearance: none; background: transparent; width: 100%; height: 16px; cursor: pointer; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 2px; background: #3f3f46; border-radius: 1px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 12px; width: 12px; border-radius: 50%; background: #d4d4d4; margin-top: -5px; transition: transform 0.1s; }
        input[type=range]:active::-webkit-slider-thumb { background: #f43f5e; transform: scale(1.2); }

        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; cursor: text;}

        .cropper-view-box, .cropper-face { border-radius: 0px; outline: 0; }
        .cropper-line, .cropper-point { background-color: #f43f5e !important; }
        .cropper-view-box { outline: 1px solid #f43f5e !important; }
        .cropper-snap .cropper-line, .cropper-snap .cropper-point { background-color: #22c55e !important; }
        .cropper-snap .cropper-view-box { outline: 2px solid #22c55e !important; }
        .cropper-modal { background-color: rgba(0,0,0,0.85); }

        #preview-area { position: absolute; inset: 0; overflow: auto; user-select: none; -webkit-user-select: none; }
        #preview-area-inner { display: flex; min-width: 100%; min-height: 100%; padding: 2rem 1rem; transition: opacity 0.2s; user-select: none; flex-wrap: nowrap; align-items: center;}
        @media (min-width: 768px) { #preview-area-inner { padding: 4rem 2rem; } }
        
        #preview-wrapper-parent { position: relative; flex-shrink: 0; box-shadow: 0 40px 100px rgba(0,0,0,0.95); margin: auto; }
        
        .preview-layer { display: flex; width: 100%; height: 100%; position: absolute; inset: 0; pointer-events: none; }
        .layer-glass { z-index: 50; pointer-events: none; }
        .layer-glass > div { pointer-events: auto; }
        
        .preview-img { image-rendering: high-quality; image-rendering: -webkit-optimize-contrast; transition: filter 0.2s; display: block; width: 100%; height: 100%; object-fit: cover;}
        
        .border-vnotch { clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%, 0 60%, 1.8% 57.5%, 0 55%, 0 51%, 1.8% 48.5%, 0 46%); }

        .slide-container { position: relative; overflow: hidden; transition: background-color 0.1s; }
        .gallery-grain-overlay { mix-blend-mode: overlay; pointer-events: none; z-index: 10; position: absolute; inset: 0; }
        
        .draggable-text, .draggable-logo { position: absolute; cursor: grab; z-index: 50; transform: translate(-50%, -50%); padding: 10px; outline: none; border: none; white-space: nowrap; display: flex; align-items: center; justify-content: center; }
        .draggable-logo img { flex-shrink: 0; max-width: none !important; pointer-events: none; display: block; }
        .draggable-text:focus, .draggable-logo:focus { outline: 1px dashed rgba(255,255,255,0.4); outline-offset: 2px; }
        
        .snap-guide { position: absolute; background-color: #f43f5e; z-index: 40; pointer-events: none; display: none; }
        .snap-guide-x { left: 0; right: 0; height: 1px; }
        .snap-guide-y { top: 0; bottom: 0; width: 1px; }

        .disabled-block { opacity: 0.3; pointer-events: none; filter: grayscale(100%); display: none; }
        .safe-zone-overlay { pointer-events: none; }
        .show-safe-zone .safe-zone-overlay { display: flex !important; }

        input[type="color"] { -webkit-appearance: none; border: none; width: 20px; height: 20px; border-radius: 50%; cursor: pointer; padding: 0; background: transparent; outline: 1px solid #52525b; outline-offset: 2px; transition: transform 0.1s;}
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 50%; }

        .style-btn { transition: all 0.1s; }
        .style-btn.active { background-color: #f43f5e; color: white; border-color: #f43f5e; }

        .preset-pill { background: #111; border: 1px solid #2d2d30; padding: 4px 8px; border-radius: 4px; font-size: 9px; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: all 0.2s; color: #888; }
        .preset-pill:hover { border-color: #555; color: #fff; }
        .preset-pill.active { background: #f43f5e; border-color: #f43f5e; color: #fff; }
        
        .preset-chip { background: #222; border: 1px solid #333; border-radius: 6px; font-size: 10px; color: #ccc; display: flex; align-items: center; overflow: hidden; transition: all 0.2s; cursor: pointer; }
        .preset-chip:hover { border-color: #555; color: #fff; }
        .preset-chip .chip-name { padding: 4px 8px; }
        .preset-chip .chip-del { padding: 4px 6px; background: #1a1a1a; color: #888; transition: background 0.2s, color 0.2s; }
        .preset-chip .chip-del:hover { background: #f43f5e; color: #fff; }

        .text-preset-gold {
            background-image: linear-gradient(135deg, #BF953F 0%, #FCF6BA 25%, #B38728 50%, #FBF5B7 75%, #AA771C 100%);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent; color: transparent;
        }
        .text-preset-silver {
            background-image: linear-gradient(135deg, #8A9097 0%, #E0E5EC 25%, #8A9097 50%, #B0B5BB 75%, #595F66 100%);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent; color: transparent;
        }

        body.zen-mode header, body.zen-mode aside { display: none !important; }
        body.zen-mode #main-stage { background-color: #000000 !important; }
        
        .zen-tooltip { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 11px; z-index: 9999; pointer-events: none; opacity: 0; transition: opacity 0.5s; letter-spacing: 0.05em;}
        .zen-mode .zen-tooltip { opacity: 1; animation: fadeOut 3s forwards; animation-delay: 2s; }
        @keyframes fadeOut { to { opacity: 0; } }

        #btn-exit-zen { display: none; }
        body.zen-mode #btn-exit-zen { display: flex; }
    </style>
</head>
<body class="fixed inset-0 w-full h-[100dvh] flex flex-col overflow-hidden overscroll-none bg-background">
    
    <div id="mobile-warning-popup" class="fixed inset-0 z-[99999] bg-black/90 backdrop-blur-md flex md:hidden flex-col items-center justify-center p-6 text-center transition-opacity duration-300">
        <h2 class="logo-font text-3xl font-bold text-white mb-6">cine<span class="text-coral-500">Roll</span></h2>
        <div class="bg-[#1c1c1e] border border-[#2d2d30] rounded-xl p-6 max-w-sm w-full shadow-2xl">
            <svg class="w-10 h-10 text-coral-500 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
            <h3 class="text-white font-bold text-lg mb-3">Desktop Optimized</h3>
            <p class="text-neutral-400 text-[13px] mb-6 leading-relaxed">
                cineRoll은 픽셀 단위의 정교한 파인아트 렌더링을 위한 <strong>PC/Mac 환경</strong>에 최적화되어 있습니다.<br><br>
                모바일 환경에서는 가벼운 <span class="text-white font-semibold">Lite 버전</span>으로 구동됩니다.
            </p>
            <button onclick="document.getElementById('mobile-warning-popup').style.display='none'" class="w-full bg-coral-500 hover:bg-coral-600 text-white font-bold py-3.5 rounded-lg text-[11px] uppercase tracking-widest transition-all shadow-lg active:scale-95">
                Continue to Lite
            </button>
        </div>
    </div>

    <div class="zen-tooltip">Press 'F' or 'ESC' to exit Zen Mode</div>
    <button id="btn-exit-zen" class="fixed top-6 right-6 z-[9999] bg-white/10 hover:bg-coral-500 text-white p-3 rounded-full transition-colors backdrop-blur-md items-center justify-center shadow-lg" onclick="toggleZenMode()" title="Exit Zen Mode">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"></path></svg>
    </button>

    <header class="h-14 border-b border-border bg-panel flex items-center justify-between px-4 md:px-6 shrink-0 z-30 shadow-sm relative">
        <div class="flex items-center gap-2 cursor-pointer" onclick="location.reload()">
            <h1 class="logo-font text-xl font-bold tracking-tight text-white">cine<span class="text-coral-500">Roll</span></h1>
        </div>
        <div class="flex items-center gap-2 md:gap-4">
            <div id="zoom-controls" class="hidden md:flex items-center gap-4 bg-[#111] px-4 py-1.5 rounded-lg border border-border shadow-md">
                <input type="range" id="slider-zoom" min="20" max="400" value="100" class="w-32 h-1">
                <button class="text-[10px] font-bold text-coral-400 hover:text-white uppercase px-1" onclick="setZoom('fit')">FIT</button>
                <div class="flex items-center"><input type="number" id="in-zoom" class="bg-transparent text-right outline-none w-8 text-white font-mono text-[10px]" value="100"><span class="text-[10px] text-neutral-400">%</span></div>
            </div>
            
            <div class="flex items-center gap-2 md:border-l md:border-border md:pl-4 md:ml-2">
                <button id="btn-zen-mode" class="hidden md:flex items-center justify-center w-8 h-8 bg-[#111] text-neutral-400 hover:text-white rounded border border-border transition-colors cursor-pointer" onclick="toggleZenMode()" title="Zen Mode (F)">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
                </button>

                <button id="btn-split-view" class="hidden items-center justify-center w-8 h-8 bg-[#111] text-neutral-400 hover:text-white rounded border border-border transition-colors cursor-pointer" onclick="toggleSplitView()" title="Split View (Before & After)">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" /><line x1="12" y1="3" x2="12" y2="21" /><rect x="12" y="3" width="9" height="18" fill="currentColor" opacity="0.3" /></svg>
                </button>
            </div>

            <button onclick="location.reload()" class="flex md:flex items-center gap-1.5 text-[10px] font-bold text-neutral-400 hover:text-white bg-[#111] px-3 py-1.5 rounded border border-border transition-colors md:ml-2" title="Start New Project">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                <span class="hidden sm:inline">NEW PHOTO</span>
            </button>
        </div>
    </header>

    <div class="flex-1 flex flex-col md:flex-row overflow-hidden w-full relative">
        
        <main id="main-stage" class="w-full h-[50%] md:h-full md:flex-1 relative flex bg-background overflow-hidden select-none transition-colors duration-300 shrink-0">
            <div id="upload-zone" class="absolute inset-0 flex flex-col items-center justify-center z-50 bg-background transition-opacity duration-300">
                <label class="relative w-[260px] md:w-[300px] h-[160px] md:h-[180px] border border-dashed border-[#333] rounded-xl flex flex-col items-center justify-center text-neutral-500 hover:border-coral-500 hover:text-coral-400 transition-colors bg-[#141414] cursor-pointer">
                    <input type="file" id="upload-input" accept="image/*,.tif,.tiff" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                    <svg class="w-8 h-8 mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    <span id="uploadText" class="text-[10px] font-bold tracking-widest uppercase">Import Resource</span>
                    <span class="text-[9px] mt-2 opacity-50">JPEG, PNG, TIFF</span>
                </label>
            </div>

            <div id="smart-snap-badge" class="absolute transform -translate-x-1/2 bg-green-500 text-black px-4 py-1.5 rounded-full font-bold text-[10px] uppercase tracking-wider opacity-0 transition-all duration-100 z-50 pointer-events-none shadow-[0_0_20px_rgba(34,197,94,0.5)]"></div>
            
            <div id="image-container" class="absolute inset-0 z-10 w-full h-full hidden opacity-0 transition-opacity duration-300"></div>
            <div id="preview-area" class="hidden z-20 w-full h-full"><div id="preview-area-inner"></div></div>
        </main>

        <aside class="w-full flex-1 md:flex-none md:w-[320px] md:h-full bg-panel border-t md:border-t-0 md:border-l border-border flex flex-col shrink-0 z-40 relative select-none overflow-hidden">
            <nav class="flex border-b border-border shrink-0 bg-panel px-2">
                <button class="tab-btn active" onclick="switchTab('format')">Format</button>
                <button class="tab-btn" onclick="switchTab('frame')">Frame</button>
                <button class="tab-btn" onclick="switchTab('color')">Color</button>
                <button class="tab-btn" onclick="switchTab('typo')">Typo</button>
            </nav>

            <div class="flex-1 overflow-y-auto custom-scroll p-4 md:p-6 overscroll-contain">
                <div id="tab-format" class="tab-content space-y-7">
                    <div>
                        <label class="min-label"><span>Output Strategy</span></label>
                        <div class="grid grid-cols-2 gap-2" id="strategy-btns">
                            <button class="min-btn active" data-val="seamless">Seamless</button>
                            <button class="min-btn" data-val="single">Single</button>
                        </div>
                    </div>
                    <div id="ratio-wrapper" class="disabled-block">
                        <div class="flex justify-between items-center mb-2"><label class="min-label mb-0"><span>Aspect Ratio</span></label><button class="text-[10px] text-neutral-500 hover:text-white" onclick="resetFraming()">↺</button></div>
                        <select class="min-select" id="select-ratio">
                            <option value="NaN">Free Crop (Smart Snap)</option>
                            <option value="1">1:1 (Square)</option>
                            <option value="0.8" selected>4:5 (Vertical IG)</option>
                            <option value="0.75">3:4 (Classic Portrait)</option>
                            <option value="0.666">2:3 (35mm Vertical)</option>
                            <option value="1.5">3:2 (35mm Horizontal)</option>
                            <option value="1.777">16:9 (Landscape)</option>
                        </select>
                    </div>
                    <div id="seamless-count-wrapper">
                        <div class="flex justify-between items-center mb-2"><label class="min-label mb-0"><span>Pan Slides</span></label><button class="text-[10px] text-neutral-500 hover:text-white" onclick="resetFraming()">↺</button></div>
                        <select class="min-select" id="select-slides"><option value="2">2 Slides</option><option value="3" selected>3 Slides</option><option value="4">4 Slides</option></select>
                    </div>
                    <div class="pt-4 border-t border-border">
                        <label class="min-label"><span>Anamorphic De-squeeze</span></label>
                        <select class="min-select" id="select-squeeze">
                            <option value="100" selected>1.0x (Standard)</option>
                            <option value="133">1.33x</option>
                            <option value="150">1.50x</option>
                            <option value="160">1.60x (Sirui)</option>
                            <option value="180">1.80x</option>
                            <option value="200">2.00x</option>
                        </select>
                    </div>
                    <div class="pt-4 border-t border-border">
                        <label class="min-label"><span>Straighten</span><div class="flex items-center"><input type="number" id="in-angle" class="bg-transparent text-right outline-none w-8 text-white font-mono hover:bg-[#222] px-1 rounded" value="0"><span>°</span></div></label>
                        <div class="flex items-center gap-2"><input type="range" id="slider-angle" min="-45" max="45" value="0" step="0.5" class="flex-1"><button class="text-[10px] text-neutral-500 hover:text-white" onclick="resetAngle()">↺</button></div>
                    </div>
                    <button class="w-full text-[11px] font-bold text-coral-400 border border-coral-900/50 hover:bg-coral-950/20 py-3 rounded mt-4 transition-colors" onclick="applyCropAndRender()">Apply Crop (Enter)</button>
                </div>

                <div id="tab-frame" class="tab-content space-y-7 hidden">
                    <div>
                        <label class="min-label mb-2"><span>Paper Texture</span></label>
                        <div class="grid grid-cols-2 gap-2 mb-2">
                            <button class="min-btn active" data-bg="#000000" onclick="setBG(this)">Pure Black</button>
                            <button class="min-btn" data-bg="#ffffff" onclick="setBG(this)">Pure White</button>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <button class="min-btn" data-bg="#141414" onclick="setBG(this)">Archival Black</button>
                            <button class="min-btn" data-bg="#F4F0E6" onclick="setBG(this)">Baryta White</button>
                        </div>
                    </div>
                    
                    <div class="pt-4 border-t border-border">
                        <label class="min-label"><span>Layout Presentation</span></label>
                        <div class="grid grid-cols-2 gap-2">
                            <button class="min-btn active" id="btn-edge" onclick="setMargin(false)">Edge-to-Edge</button>
                            <button class="min-btn" id="btn-margin" onclick="setMargin(true)">Margin Frame</button>
                        </div>
                    </div>
                    
                    <div id="margin-scale-wrapper" class="pt-4 border-t border-border hidden">
                        <label class="min-label"><span>Frame Padding</span><div class="flex items-center"><input type="number" id="in-margin-scale" class="bg-transparent text-right outline-none w-8 text-white font-mono hover:bg-[#222] px-1 rounded" value="85"><span>%</span></div></label>
                        <div class="flex items-center gap-2"><input type="range" id="slider-margin-scale" min="50" max="100" value="85" oninput="ModuleFrame.build()"></div>
                        
                        <div class="mt-5 border-t border-border pt-4">
                            <label class="min-label mb-2"><span class="text-coral-400 font-bold">Film Borders (Pro)</span></label>
                            <select id="select-border" class="min-select bg-[#141414]" onchange="ModuleFrame.updateBorderOptions()">
                                <option value="none">None (Clean Cut)</option>
                                <option value="fineart">Fine-Art Solid Line</option>
                                <option value="vnotch">120mm V-Notch Edge</option>
                                <option value="instant">Type-100</option>
                            </select>
                            
                            <div id="border-weight-wrapper" class="mt-3 hidden transition-opacity duration-300">
                                <label class="min-label mb-1"><span>Border Weight</span><div class="flex items-center"><input type="number" id="in-borderWeight" class="bg-transparent text-right outline-none w-8 text-white font-mono hover:bg-[#222] px-1 rounded" value="3"></div></label>
                                <input type="range" id="slider-borderWeight" min="1" max="10" value="3" step="0.5" oninput="ModuleFrame.build()">
                            </div>
                        </div>
                    </div>

    <script>
        const DOM = {

            wmText: document.getElementById('watermarkText'), fontSel: document.getElementById('fontSelect'), textColor: document.getElementById('textColorPicker'), wmTarget: document.getElementById('watermarkTarget'),
            sGlowAmt: document.getElementById('slider-glow-amount'), valGlow: document.getElementById('val-glow'), glowWrapper: document.getElementById('glow-slider-wrapper'),
            
            sFontScale: document.getElementById('slider-fontScale'), inFontScale: document.getElementById('in-fontScale'), 
            
            upLogo: document.getElementById('uploadLogo'), logoSettings: document.getElementById('logoSettings'), logoStatus: document.getElementById('logoStatus'), toggleLogo: document.getElementById('toggle-logo'),
            sLogoScale: document.getElementById('sliderLogoScale'), inLogoScale: document.getElementById('in-logoScale'),
            sLogoOp: document.getElementById('sliderLogoOp'), inLogoOp: document.getElementById('in-logoOp'),
            btnExport: document.getElementById('btn-export'), badge: document.getElementById('smart-snap-badge'),
            zoomControls: document.getElementById('zoom-controls'), sliderZoom: document.getElementById('slider-zoom'), inZoom: document.getElementById('in-zoom'),
            marginScaleWrapper: document.getElementById('margin-scale-wrapper'), sMarginScale: document.getElementById('slider-margin-scale'), inMarginScale: document.getElementById('in-margin-scale'),
            
            sBorder: document.getElementById('select-border'), sBorderWeight: document.getElementById('slider-borderWeight'), inBorderWeight: document.getElementById('in-borderWeight'),
            borderWeightWrapper: document.getElementById('border-weight-wrapper'),
            
            targetWrapper: document.getElementById('target-display-wrapper'),
            presetsContainer: document.getElementById('custom-presets-container'),
            exportQuality: document.getElementById('exportQuality')
        };

        let cropper = null; let originalImg = null; let rawFile = null; let currentStrategy = 'seamless'; 
        let proxyCropUrl = null; 
        let staticGrainDataUrl = null; let activeGlobalRatio = 1; let zoomMode = 'fit';
        let isMargin = false; let bgColor = '#000000'; let isSafeZone = false;
        let isBold = false; let isGlow = true; let isExifOn = false; let manualBackupText = "";
        let tPosX = 50, tPosY = 94, lPosX = 50, lPosY = 80; let logoObj = null; let logoUrl = null; let activeTarget = null;
        let isCropperReady = false; let textStylePreset = 'none'; 
        let isSplitView = false; let splitPos = 50; 
        let savedCustomPresets = [];
        let lutStyleStr = 'none';

        function initGrain() {
            const c = document.createElement('canvas'); c.width = 256; c.height = 256; const ctx = c.getContext('2d'); const id = ctx.createImageData(256, 256);
            for (let i = 0; i < id.data.length; i += 4) { const v = Math.random() < 0.5 ? 0 : 255; id.data[i] = id.data[i+1] = id.data[i+2] = v; id.data[i+3] = 40; }
            ctx.putImageData(id, 0, 0); staticGrainDataUrl = c.toDataURL('image/png');
        }
        initGrain();

        window.addEventListener('DOMContentLoaded', () => { 
            loadPresetsFromStorage(); 
            initGlobalDrag(); 
        });

        function loadPresetsFromStorage() {
            const stored = localStorage.getItem('cineroll_presets_v2');
            if (stored) { 
                try { savedCustomPresets = JSON.parse(stored); renderPresetChips(); } 
                catch(e) { console.error("Preset parsing error", e); }
            }
        }

        function bindInputSlider(slider, input, callback) {
            if(!slider || !input) return;
            slider.addEventListener('input', (e) => { input.value = e.target.value; if(callback) callback(); });
            input.addEventListener('change', (e) => { 
                let val = parseFloat(e.target.value);
                if(val < parseFloat(slider.min)) val = slider.min;
                if(val > parseFloat(slider.max)) val = slider.max;
                e.target.value = val; slider.value = val; 
                if(callback) callback(); 
            });
        }
        bindInputSlider(DOM.sAngle, DOM.inAngle, () => { if(cropper) cropper.rotateTo(DOM.sAngle.value); });
        bindInputSlider(DOM.sBr, DOM.inBr, () => ModuleColor.update());
        bindInputSlider(DOM.sCo, DOM.inCo, () => ModuleColor.update());
        bindInputSlider(DOM.sSa, DOM.inSa, () => ModuleColor.update());
        bindInputSlider(DOM.sGrain, DOM.inGrain, () => ModuleColor.update());
        bindInputSlider(DOM.sLogoScale, DOM.inLogoScale, () => ModuleTypo.update());
        bindInputSlider(DOM.sLogoOp, DOM.inLogoOp, () => ModuleTypo.update());
        bindInputSlider(DOM.sMarginScale, DOM.inMarginScale, () => ModuleFrame.build());
        bindInputSlider(DOM.sFontScale, DOM.inFontScale, () => ModuleTypo.update()); 
        bindInputSlider(DOM.sBorderWeight, DOM.inBorderWeight, () => ModuleFrame.build());

        DOM.sliderZoom.addEventListener('input', (e) => { zoomMode = 'custom'; DOM.inZoom.value = e.target.value; applyZoom(); });
        DOM.inZoom.addEventListener('change', (e) => { zoomMode = 'custom'; DOM.sliderZoom.value = e.target.value; applyZoom(); });

        window.toggleSplitView = () => {
            isSplitView = !isSplitView;
            DOM.btnBA.classList.toggle('active', isSplitView);
            DOM.btnBA.classList.toggle('text-coral-400', isSplitView);
            ModuleFrame.build(); 
        };
        
        window.toggleZenMode = () => {
            if(!proxyCropUrl) return;
            document.body.classList.toggle('zen-mode');
            setTimeout(() => applyZoom(), 100);
        };

        let isDraggingSplit = false;
        window.addEventListener('mousemove', (e) => {
            if(!isDraggingSplit || !isSplitView) return;
            e.preventDefault(); 
            const parentWrapper = document.getElementById('preview-wrapper-parent');
            const layerImagesBefore = document.getElementById('layer-images-before');
            const handle = document.getElementById('split-handle');
            if(!parentWrapper || !layerImagesBefore || !handle) return;
            
            const rect = parentWrapper.getBoundingClientRect();
            let pct = ((e.clientX - rect.left) / rect.width) * 100;
            pct = Math.max(0, Math.min(100, pct));
            splitPos = pct;
            
            layerImagesBefore.style.clipPath = `polygon(0 0, ${pct}% 0, ${pct}% 100%, 0 100%)`;
            layerImagesBefore.style.WebkitClipPath = `polygon(0 0, ${pct}% 0, ${pct}% 100%, 0 100%)`; 
            handle.style.left = `${pct}%`;
        });
        window.addEventListener('mouseup', () => { isDraggingSplit = false; });

        document.addEventListener('keydown', (e) => {
            const isInput = ['INPUT', 'TEXTAREA'].includes(e.target.tagName);
            if(e.key.toLowerCase() === 'f' && !isInput) { e.preventDefault(); toggleZenMode(); }
            if(e.key === 'Escape' && document.body.classList.contains('zen-mode')) { toggleZenMode(); }
            
            if(e.key === 'Enter' && !isInput && e.target.tagName !== 'BUTTON') {
                const formatTab = document.getElementById('tab-format');
                if(formatTab && !formatTab.classList.contains('hidden') && cropper && isCropperReady) {
                    e.preventDefault(); applyCropAndRender(); 
                }
            }
            if(activeTarget && !isInput) {
                const step = 0.5; let moved = false;
                if(e.key === 'ArrowUp') { if(activeTarget==='text') tPosY-=step; else lPosY-=step; moved=true; }
                if(e.key === 'ArrowDown') { if(activeTarget==='text') tPosY+=step; else lPosY+=step; moved=true; }
                if(e.key === 'ArrowLeft') { if(activeTarget==='text') tPosX-=step; else lPosX-=step; moved=true; }
                if(e.key === 'ArrowRight') { if(activeTarget==='text') tPosX+=step; else lPosX+=step; moved=true; }
                if(moved) { e.preventDefault(); ModuleTypo.updatePositions(); }
            }
        });

        function switchTab(target) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase() === target));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById(`tab-${target}`).classList.remove('hidden');
            
            if(target === 'format') {
                DOM.previewArea.classList.add('hidden'); 
                DOM.zoomControls.classList.add('hidden'); 
                DOM.btnBA.classList.add('hidden'); DOM.btnBA.classList.remove('flex');
                document.getElementById('btn-zen-mode').classList.add('hidden'); document.getElementById('btn-zen-mode').classList.remove('flex');
                
                DOM.main.classList.remove('hidden');
                DOM.main.style.display = 'block';
                void DOM.main.offsetWidth;
                
                setTimeout(() => { 
                    if(originalImg && !cropper) {
                        setupCropper(); 
                    } else if(cropper) { 
                        DOM.main.classList.add('opacity-100'); 
                        cropper.resize(); 
                    }
                }, 50); 
            } else {
                DOM.main.classList.remove('opacity-100'); DOM.main.style.display = 'none'; 
                if(proxyCropUrl) { 
                    DOM.previewArea.classList.remove('hidden'); 
                    DOM.zoomControls.classList.remove('hidden'); 
                    DOM.btnBA.classList.remove('hidden'); DOM.btnBA.classList.add('flex');
                    document.getElementById('btn-zen-mode').classList.remove('hidden'); document.getElementById('btn-zen-mode').classList.add('flex');
                    applyZoom(); 
                }
            }
        }

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eName => { DOM.mainStage.addEventListener(eName, e => { e.preventDefault(); e.stopPropagation(); }, false); });
        DOM.mainStage.addEventListener('drop', e => { if(e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]); });
        DOM.upInput.addEventListener('change', e => { if(e.target.files.length) handleFile(e.target.files[0]); });

        async function handleFile(file) {
            if (!file) return; 
            const isTiff = file.name.toLowerCase().match(/\.tiff?$/);
            if (!file.type.startsWith('image/') && !isTiff) return;

            DOM.upText.innerText = "Processing File..."; rawFile = file;
            
            try {
                if (isTiff) {
                    const arrayBuffer = await file.arrayBuffer(); const ifds = UTIF.decode(arrayBuffer); UTIF.decodeImage(arrayBuffer, ifds[0]);
                    const rgba = UTIF.toRGBA8(ifds[0]); const cvs = document.createElement('canvas'); cvs.width = ifds[0].width; cvs.height = ifds[0].height;
                    const ctx = cvs.getContext('2d'); const imgData = new ImageData(new Uint8ClampedArray(rgba.buffer), cvs.width, cvs.height); ctx.putImageData(imgData, 0, 0);
                    originalImg = new Image(); 
                    originalImg.onload = () => { 
                        DOM.upZone.classList.add('hidden'); DOM.upText.innerText = "Import Professional Resource"; switchTab('format'); 
                    }; 
                    originalImg.src = cvs.toDataURL('image/jpeg', 0.95);
                    cvs.width = 0; cvs.height = 0;
                } else {
                    originalImg = new Image(); 
                    originalImg.onload = () => { 
                        DOM.upZone.classList.add('hidden'); DOM.upText.innerText = "Import Professional Resource"; switchTab('format'); 
                    }; 
                    originalImg.src = URL.createObjectURL(file);
                }
            } catch (err) { alert("이미지 처리 오류."); DOM.upText.innerText = "Import Professional Resource"; }
        }

        function setupCropper() {
            if(!originalImg) return; isCropperReady = false; 
            if(cropper) { cropper.destroy(); cropper = null; }
            DOM.main.innerHTML = ''; const newImg = document.createElement('img'); newImg.style.display = 'block'; newImg.style.maxWidth = '100%';
            
            const sf = parseFloat(DOM.sSqueeze.value)/100; const cvs = document.createElement('canvas');
            let tw = originalImg.width * sf; let th = originalImg.height; 
            const maxW = 3500; if(tw > maxW) { const scale = maxW / tw; th *= scale; tw = maxW; } 
            cvs.width = tw; cvs.height = th; cvs.getContext('2d').drawImage(originalImg, 0, 0, originalImg.width, originalImg.height, 0, 0, tw, th);
            
            cvs.toBlob((blob) => {
                const proxyObjUrl = URL.createObjectURL(blob); 
                newImg.src = proxyObjUrl;
                cvs.width = 0; cvs.height = 0; 
                
                newImg.onload = () => {
                    cropper = new Cropper(newImg, { 
                        viewMode: 1, 
                        dragMode: 'none', autoCrop: false, background: false, 
                        ready: () => { 
                            cropper.crop(); 
                            updateCropperRatio(); 
                            isCropperReady = true; 
                            setTimeout(() => { DOM.main.classList.remove('opacity-0'); DOM.main.classList.add('opacity-100'); }, 50); 
                        },
                        crop: () => {
                            const isFree = isNaN(parseFloat(DOM.sRatio.value)); if(!isFree) { DOM.badge.classList.add('opacity-0'); return; }
                            const d = cropper.getCropBoxData(); if(!d || d.width===0 || d.height===0) return;
                            const r = d.width/d.height; let txt = "";
                            if(r>0.78 && r<0.82) txt="4:5 Vertical IG"; else if(r>0.98 && r<1.02) txt="1:1 Square"; else if(r>1.75 && r<1.8) txt="16:9 Landscape";
                            else if(r>0.65 && r<0.68) txt="2:3 Vertical"; else if(r>1.45 && r<1.55) txt="3:2 Horizontal"; else if(r>0.74 && r<0.76) txt="3:4 Classic";
                            if(txt) { DOM.badge.innerText=txt; DOM.badge.classList.remove('opacity-0'); DOM.badge.style.top = Math.max(10, d.top - 28) + 'px'; DOM.badge.style.left = (d.left + d.width/2) + 'px'; } else DOM.badge.classList.add('opacity-0');
                        }
                    });
                }; DOM.main.appendChild(newImg);
            }, 'image/jpeg', 0.95);
        }

        function updateCropperRatio() {
            if(!cropper) return; let fr = NaN; const br = parseFloat(DOM.sRatio.value);

                        if(currentStrategy === 'seamless') { ctx.drawImage(masterCanvas, i * singleW, 0, singleW, exportH, drawX, drawY, drawW, drawH); } else { ctx.drawImage(masterCanvas, drawX, drawY, drawW, drawH); }
                    } else { 
                        if(currentStrategy === 'seamless') { ctx.drawImage(masterCanvas, i * singleW, 0, singleW, exportH, 0, 0, sliceW, exportH); } else { ctx.drawImage(masterCanvas, 0, 0, sliceW, exportH); }
                    } 
                    ctx.restore();

                    if (isMargin) {
                        if (activeBorder === 'fineart') {
                            ctx.save();
                            const strokeW = Math.max(1, exportH * 0.001 * bWeight); 
                            ctx.strokeStyle = 'rgba(20,20,20,0.95)';
                            ctx.lineWidth = strokeW;
                            ctx.strokeRect(drawX + strokeW/2, drawY + strokeW/2, drawW - strokeW, drawH - strokeW);
                            ctx.restore();
                        }
                        else if (activeBorder === 'vnotch') {
                            ctx.save();
                            ctx.globalCompositeOperation = 'destination-out';
                            ctx.beginPath();
                            const nTop = exportH * 0.45;
                            const nHeight = exportH * 0.10;
                            const notchW = sliceW * 0.015; 
                            
                            ctx.moveTo(0, nTop);
                            ctx.lineTo(notchW, nTop + nHeight*0.25);
                            ctx.lineTo(0, nTop + nHeight*0.4);
                            ctx.lineTo(0, nTop + nHeight*0.6); 
                            ctx.lineTo(notchW, nTop + nHeight*0.75);
                            ctx.lineTo(0, nTop + nHeight);
                            ctx.closePath();
                            ctx.fill();
                            ctx.restore();
                        }
                    }

                    if (grainCanvas) { ctx.save(); ctx.globalAlpha = (gi / 100) * 1.5; ctx.globalCompositeOperation = 'soft-light'; ctx.fillStyle = ctx.createPattern(grainCanvas, 'repeat'); ctx.fillRect(0, 0, sliceW, exportH); ctx.restore(); }
                    
                    const txt = DOM.wmText.value.trim(); const target = DOM.wmTarget.value;
                    const glowAmt = parseInt(DOM.sGlowAmt.value);
                    const showLogo = DOM.toggleLogo ? DOM.toggleLogo.checked : false;

                    if (txt && (currentStrategy === 'single' || target === 'all' || parseInt(target) === i + 1)) {
                        ctx.save(); 
                        const fontWeight = isBold ? 'bold ' : ''; 
                        const fontScaleMultiplier = DOM.sFontScale.value / 100; 
                        const exportFontSize = Math.floor(exportH * (currentStrategy === 'single' ? 0.025 : 0.018)) * fontScaleMultiplier;
                        
                        let fontVal = DOM.fontSel.value; 
                        ctx.font = `${fontWeight} ${exportFontSize}px '${fontVal}', sans-serif`; 
                        ctx.textBaseline = 'middle'; ctx.textAlign = 'center'; ctx.letterSpacing = "2px"; 
                        
                        const textDrawX = sliceW * (tPosX / 100); const textDrawY = exportH * (tPosY / 100);
                        const textWidth = ctx.measureText(txt).width;
                        
                        if (textStylePreset !== 'none') {
                            const gradient = ctx.createLinearGradient(
                                textDrawX - textWidth/2, textDrawY - exportFontSize/2, 
                                textDrawX + textWidth/2, textDrawY + exportFontSize/2
                            );
                            if (textStylePreset === 'gold') {
                                gradient.addColorStop(0, "#BF953F"); gradient.addColorStop(0.25, "#FCF6BA"); gradient.addColorStop(0.5, "#B38728"); gradient.addColorStop(0.75, "#FBF5B7"); gradient.addColorStop(1, "#AA771C");
                            } else {
                                gradient.addColorStop(0, "#8A9097"); gradient.addColorStop(0.25, "#E0E5EC"); gradient.addColorStop(0.5, "#8A9097"); gradient.addColorStop(0.75, "#B0B5BB"); gradient.addColorStop(1, "#595F66");
                            }
                            ctx.fillStyle = gradient;
                        } else {
                            ctx.fillStyle = DOM.textColor.value;
                        }
                        
                        if (isGlow) { 
                            const glowScale = exportFontSize / 50; 
                            const currentGlow = glowAmt * glowScale;
                            ctx.shadowColor = (textStylePreset === 'none') ? DOM.textColor.value : 'rgba(0,0,0,0.8)'; 
                            ctx.shadowBlur = currentGlow * 1.5; 
                        } else { 
                            ctx.shadowColor = 'transparent'; 
                        }
                        
                        ctx.fillText(txt, textDrawX, textDrawY); ctx.restore(); 
                    }
                    if (logoObj && logoUrl && showLogo && (currentStrategy === 'single' || target === 'all' || parseInt(target) === i + 1)) {
                        ctx.save(); ctx.globalAlpha = DOM.sLogoOp.value / 100; 
                        const drawLogoW = sliceW * (DOM.sLogoScale.value / 100) * 0.5; 
                        const drawLogoH = (drawLogoW / logoObj.width) * logoObj.height;
                        ctx.drawImage(logoObj, (sliceW * (lPosX / 100)) - (drawLogoW/2), (exportH * (lPosY / 100)) - (drawLogoH/2), drawLogoW, drawLogoH); ctx.restore();
                    }
                    
                    const outputQuality = isHighRes ? 1.0 : 0.95; 
                    await new Promise((resolve, reject) => { 
                        workCvs.toBlob((blob) => { 
                            if(blob) { zip.file(currentStrategy === 'seamless' ? `cineRoll_pan_${i+1}.jpg` : `cineRoll_single.jpg`, blob); resolve(); }
                            else { reject(new Error("Canvas to Blob failed. Image might be too large.")); }
                        }, 'image/jpeg', outputQuality); 
                        workCvs.width = 0; workCvs.height = 0;
                    });
                }
                const content = await zip.generateAsync({type:"blob"}); masterCanvas.width = 0; masterCanvas.height = 0; const link = document.createElement('a'); link.href = URL.createObjectURL(content); link.download = `cineRoll_Gallery.zip`; document.body.appendChild(link); link.click(); document.body.removeChild(link); DOM.btnExport.innerText = "✅ Download Complete!";
            } catch (err) { alert("Export Failed: " + err.message); console.error(err); } finally { DOM.btnExport.classList.remove('opacity-70', 'pointer-events-none'); setTimeout(() => { DOM.btnExport.innerText = "Export Gallery"; }, 3000); }
        });

        function setBG(el) { document.querySelectorAll('[data-bg]').forEach(b=>b.classList.remove('active')); el.classList.add('active'); bgColor=el.dataset.bg; document.querySelectorAll('.slide-container').forEach(sc => { if(!sc.closest('[style*="polygon"]')) { sc.style.backgroundColor = bgColor; } }); ModuleTypo.update(); }
        function setMargin(val) { isMargin=val; document.getElementById('btn-edge').classList.toggle('active', !val); document.getElementById('btn-margin').classList.toggle('active', val); DOM.marginScaleWrapper.classList.toggle('hidden', !val); ModuleFrame.build(); }
        function toggleSafeZone() { isSafeZone=!isSafeZone; document.getElementById('btn-safezone').innerText=isSafeZone?'ON':'OFF'; document.getElementById('btn-safezone').classList.toggle('active', isSafeZone); DOM.previewArea.classList.toggle('show-safe-zone', isSafeZone); }
        
        window.applyCinePreset = function(type) { 
            textStylePreset = type; 
            document.querySelectorAll('.preset-pill').forEach(p => p.classList.remove('active')); 
            if(type==='gold') { document.getElementById('btn-preset-gold').classList.add('active'); } 
            else if(type==='silver') { document.getElementById('btn-preset-silver').classList.add('active'); } 
            ModuleTypo.update(); 
        }
        
        window.saveCurrentPreset = function() { 
            const txt = DOM.wmText.value.trim(); 
            if(!txt) return alert("프리셋으로 저장할 텍스트를 입력해주세요."); 
            const preset = { id: Date.now(), text: txt, color: DOM.textColor.value, bold: isBold, glow: isGlow, font: DOM.fontSel.value, glowAmt: DOM.sGlowAmt.value, type: textStylePreset }; 
            savedCustomPresets.push(preset); 
            localStorage.setItem('cineroll_presets_v2', JSON.stringify(savedCustomPresets)); 
            
            const saveBtn = document.getElementById('btn-save-preset'); 
            saveBtn.innerText = "✔️ Saved"; 
            saveBtn.classList.add('text-green-400'); 
            setTimeout(() => { saveBtn.innerText = "SAVE PRESET"; saveBtn.classList.remove('text-green-400'); }, 1000); 
            
            renderPresetChips(); 
        }
        
        function renderPresetChips() { 
            const container = document.getElementById('custom-presets-container');
            if(!container) return;
            container.innerHTML = ''; 
            savedCustomPresets.forEach(p => { 
                const chip = document.createElement('div'); chip.className = "preset-chip flex items-center bg-[#1a1a1c] border border-border rounded text-[10px] text-neutral-400 cursor-pointer hover:border-coral-500/50 transition-colors"; 
                const nameBtn = document.createElement('div'); nameBtn.className = "px-3 py-1.5 truncate max-w-[120px]"; nameBtn.innerText = p.text; nameBtn.onclick = () => loadPreset(p); 
                const delBtn = document.createElement('div'); delBtn.className = "px-2 py-1.5 border-l border-border hover:bg-coral-500 hover:text-white transition-colors"; delBtn.innerText = "×"; delBtn.onclick = (e) => { e.stopPropagation(); deletePreset(p.id); }; 
                chip.appendChild(nameBtn); chip.appendChild(delBtn); container.appendChild(chip); 
            }); 
        }
        
        function loadPreset(p) { 
            DOM.wmText.value = p.text; 
            DOM.textColor.value = p.color; 
            isBold = p.bold; 
            isGlow = p.glow; 
            DOM.fontSel.value = p.font; 
            DOM.sGlowAmt.value = p.glowAmt || 15; 
            textStylePreset = p.type; 
            
            document.getElementById('btnBold').classList.toggle('active', isBold); 
            document.getElementById('btnGlow').classList.toggle('active', isGlow); 
            
            document.querySelectorAll('.preset-pill').forEach(btn => btn.classList.remove('active')); 
            if(p.type === 'gold') document.getElementById('btn-preset-gold').classList.add('active'); 
            if(p.type === 'silver') document.getElementById('btn-preset-silver').classList.add('active'); 
            
            ModuleTypo.update(); 
        }
        
        function deletePreset(id) { savedCustomPresets = savedCustomPresets.filter(p => p.id !== id); localStorage.setItem('cineroll_presets_v2', JSON.stringify(savedCustomPresets)); renderPresetChips(); }
        window.exportPresets = function() { if(savedCustomPresets.length === 0) return alert("내보낼 프리셋이 없습니다."); const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(savedCustomPresets)); const downloadAnchorNode = document.createElement('a'); downloadAnchorNode.setAttribute("href", dataStr); downloadAnchorNode.setAttribute("download", "cineroll_presets.json"); document.body.appendChild(downloadAnchorNode); downloadAnchorNode.click(); downloadAnchorNode.remove(); }
        window.importPresets = function(e) { const file = e.target.files[0]; if(!file) return; const reader = new FileReader(); reader.onload = (event) => { try { const imported = JSON.parse(event.target.result); if(Array.isArray(imported)) { savedCustomPresets = imported; localStorage.setItem('cineroll_presets_v2', JSON.stringify(savedCustomPresets)); renderPresetChips(); alert("프리셋을 성공적으로 불러왔습니다!"); } else { throw new Error(); } } catch(err) { alert("잘못된 프리셋 파일입니다."); } }; reader.readAsText(file); e.target.value = ''; }
        
        function toggleBold() { isBold=!isBold; document.getElementById('btnBold').classList.toggle('active', isBold); ModuleTypo.update(); }
        function toggleGlow() { isGlow=!isGlow; document.getElementById('btnGlow').classList.toggle('active', isGlow); ModuleTypo.update(); }
        
        DOM.upLogo.addEventListener('change', e => { 
            const file = e.target.files[0]; if(!file) return; 
            const reader = new FileReader(); 
            reader.onload = ev => { 
                logoUrl = ev.target.result; 
                logoObj = new Image(); 
                logoObj.onload = () => { 
                    DOM.toggleLogo.checked = true;
                    DOM.logoStatus.classList.remove('hidden'); 
                    DOM.logoSettings.classList.remove('opacity-30', 'pointer-events-none');
                    ModuleTypo.update(); 
                }; 
                logoObj.src = logoUrl; 
            }; 
            reader.readAsDataURL(file); 
        });

        function extractExif() { 
            if(!rawFile) return alert("사진을 먼저 업로드해주세요."); 
            if(isExifOn) { isExifOn=false; DOM.wmText.value=manualBackupText; ModuleTypo.update(); return; } 
            
            exifr.parse(rawFile, {tiff: true, exif: true}).then(exif => { 
                if(exif && Object.keys(exif).length > 0) { 
                    let t = []; 
                    
                    let make = exif.Make || "";
                    let model = exif.Model || "";
                    let cameraStr = "";
                    if (make && model) {
                        if (model.toLowerCase().startsWith(make.toLowerCase())) cameraStr = model;
                        else cameraStr = `${make} ${model}`;
                    } else {
                        cameraStr = make || model || "";
                    }
                    if (cameraStr) t.push(cameraStr);

                    let aperture = exif.FNumber || exif.ApertureValue;
                    if(aperture && Number(aperture) > 0) t.push(`f/${Number(aperture).toFixed(1).replace('.0', '')}`); 
                    
                    if(exif.ExposureTime) t.push(`${exif.ExposureTime>=1 ? exif.ExposureTime : `1/${Math.round(1/exif.ExposureTime)}`}s`); 
                    if(exif.ISO) t.push(`ISO ${exif.ISO}`); 
                    if(exif.LensModel) t.push(exif.LensModel);

                    if(t.length) { manualBackupText=DOM.wmText.value; DOM.wmText.value=t.join(' | '); isExifOn=true; ModuleTypo.update(); } 
                } else { 
                    let oldVal = DOM.wmText.value; DOM.wmText.value = "No EXIF Data"; setTimeout(() => { DOM.wmText.value = oldVal; ModuleTypo.update(); }, 1500);
                    ModuleTypo.update();
                } 
            }).catch(err => { 
                let oldVal = DOM.wmText.value; DOM.wmText.value = "No EXIF Data"; setTimeout(() => { DOM.wmText.value = oldVal; ModuleTypo.update(); }, 1500); 
                ModuleTypo.update();
            }); 
        }

        function setZoom(mode) { zoomMode = mode; if(mode === 'fit') { DOM.sliderZoom.value = 100; DOM.inZoom.value = 100; } applyZoom(); }
        function applyZoom() { requestAnimationFrame(() => { const parentWrap = document.getElementById('preview-wrapper-parent'); if(!parentWrap) return; const parentW = DOM.previewArea.clientWidth - 64; const parentH = DOM.previewArea.clientHeight - 100; if (parentW <= 0 || parentH <= 0) return; if (zoomMode === 'fit') { let targetH = Math.min(parentH, parentW / activeGlobalRatio); parentWrap.style.height = targetH + 'px'; parentWrap.style.width = (targetH * activeGlobalRatio) + 'px'; DOM.inZoom.value = 100; DOM.sliderZoom.value = 100; } else { let val = DOM.sliderZoom.value; let baseHeightForZoom = Math.min(parentH, parentW / activeGlobalRatio); let zoomedH = baseHeightForZoom * (val / 100); parentWrap.style.height = zoomedH + 'px'; parentWrap.style.width = (zoomedH * activeGlobalRatio) + 'px'; DOM.inZoom.value = val; } ModuleTypo.update(); }); }
        window.addEventListener('resize', () => { if(zoomMode === 'fit') applyZoom(); });
    </script>
